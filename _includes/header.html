<header id="ubc7-header" role="banner">
  <div class="collapse expand" id="ubc7-global-menu">
    <div id="ubc7-search" class="expand">
      <div class="container">
        <div id="ubc7-search-box">
          <form class="form-search" method="get" action="https://www.ubc.ca/search/refine/" role="search">
            <input type="text" name="q" placeholder="Search this website" class="input-xlarge search-query" />
            <input type="hidden" name="label" value="Search {{ site.data.site.short_title }}" />
            <input type="hidden" name="site" value="*.ubc.ca" />
            <button type="submit" class="btn">Search</button>
          </form>
        </div>
      </div>
    </div>
    <div id="ubc7-global-header" class="expand">
      <div class="container">
        <div id="ubc7-logo">
          <a href="https://www.ubc.ca/" title="The University of British Columbia">The University of British Columbia</a>
        </div>
        <div id="ubc7-apom">
          <a href="https://cdn.ubc.ca/clf/ref/aplaceofmind.html" title="UBC - A Place of Mind">UBC - A Place of Mind</a>
        </div>
        <div id="ubc7-global-header-inner" class="expand">
          <div id="ubc7-global-secondary">
            <div id="ubc7-global-secondary-no-index">
              <a href="https://www.ubc.ca/" title="The University of British Columbia">The University of British Columbia</a>
              <span class="ubc7-campus" id="ubc7-vancouver-campus">Vancouver Campus</span>
            </div>
          </div>
          <div id="ubc7-global-links">
            <a href="https://search.ubc.ca/" title="UBC Search">UBC Search</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="ubc7-unit" class="row-fluid expand">
    <div class="container">
      <div class="span12">
        <div id="ubc7-unit-name" class="ubc7-single-element">
          <a href="{{ '/' | relative_url }}" title="{{ site.data.site.short_title }}">
            <span id="ubc7-unit-identifier">{{ site.data.site.short_title }}</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="ubc7-unit-menu" class="navbar expand" role="navigation" aria-label="Primary">
    <div class="navbar-inner expand">
      <div class="container">
        <button class="btn btn-navbar nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
          Menu
        </button>
        <div class="nav-collapse collapse" id="primary-nav">
          <ul class="nav">
            {% for item in site.data.navigation.primary %}
              <li{% if page.url == item.url %} class="active"{% endif %}>
                <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %} title="{{ item.title }}">{{ item.title }}</a>
              </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </div>
</header>
