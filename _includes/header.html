<header class="site-header">
  <div class="wrap">
    <div class="nav">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="Home">
        {{ site.data.site.short_title }} <small>UBC</small>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
        Menu
      </button>
      <nav id="primary-nav" aria-label="Primary">
        <ul>
          {% for item in site.data.navigation.primary %}
            <li>
              <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</header>
