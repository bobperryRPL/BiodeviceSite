<header id="ubc7-header">
  <div id="ubc7-global-header">
    <div class="wrap ubc7-global-row">
      <a class="ubc7-global-brand" href="https://www.ubc.ca/" aria-label="The University of British Columbia">
        <span class="ubc7-crest" aria-hidden="true">
          <img src="{{ '/assets/ubc-logo-2018-crest-white-rgb72.png' | relative_url }}" alt="" />
        </span>
        <span class="ubc7-global-brand-text">
          <span class="ubc7-global-wordmark">
            <span>The University of</span>
            <span>British Columbia</span>
          </span>
          <span class="ubc7-global-campus">Vancouver Campus</span>
        </span>
      </a>
      <div class="ubc7-global-meta">
        <a class="ubc7-search-link" href="https://search.ubc.ca/" title="UBC Search">UBC Search</a>
      </div>
    </div>
  </div>

  <div id="ubc7-unit">
    <div class="wrap">
      <div class="ubc7-unit-row">
        <div id="ubc7-unit-name" class="ubc7-single-element">
          <a href="{{ '/' | relative_url }}" aria-label="Home">
            <span class="ubc7-unit-mark" aria-hidden="true">
              <img src="{{ '/assets/sbme-logo.png' | relative_url }}" alt="" />
            </span>
            <span id="ubc7-unit-identifier">{{ site.data.site.short_title }}</span>
          </a>
        </div>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
          Menu
        </button>
      </div>
    </div>
  </div>

  <div id="ubc7-unit-menu" role="navigation" aria-label="Primary">
    <div class="wrap">
      <nav id="primary-nav" aria-label="Primary">
        <ul>
          {% for item in site.data.navigation.primary %}
            <li>
              <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</header>
